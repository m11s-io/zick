name: Action Smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  action-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare sample project
        run: |
          mkdir -p action-smoke
          printf '{"dependencies":{}}\n' > action-smoke/package.json

      - name: Run local action
        uses: ./
        with:
          version: local
          commands: fresh
          path: action-smoke
