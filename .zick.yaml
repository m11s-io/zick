# zick configuration — place this file at the root of your project.
# All settings are optional; defaults are shown.

fresh:
  age_gate_days: 7           # flag packages published within this many days
  include_dev: false         # include devDependencies
  fail_on: high              # exit 1 on: high | warn
  format: table              # table | json

secrets:
  tool: auto                 # betterleaks | gitleaks | auto

scan:
  tools: [osv-scanner, trivy]
  sarif_output: ""          # optional path, e.g. zick.sarif

sbom:
  format: cyclonedx-json    # cyclonedx-json | spdx-json | syft-json
  output: ""                # optional path, e.g. sbom.json

hook:
  include_secrets: false     # run zick secrets in the pre-commit hook
  secrets_tool: auto         # betterleaks | gitleaks | auto
